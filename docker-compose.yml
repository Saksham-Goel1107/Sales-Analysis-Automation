version: "3.9"

services:
  chicken-analysis:
    build: .
    container_name: chicken-analysis
    restart: unless-stopped

    # ── Environment variables ────────────────────────────────────────────────
    env_file:
      - .env

    # ── Volumes ─────────────────────────────────────────────────────────────
    # Mounts the service account key inside the container
    volumes:
      - ./service.json:/secrets/service.json:ro
      - ./logs:/app/logs

    # ── Healthcheck ─────────────────────────────────────────────────────────
    # Verifies supercronic (PID 1) is active
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
