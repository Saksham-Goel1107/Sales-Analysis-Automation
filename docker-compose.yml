version: "3.9"

services:
  chicken-analysis:
    build: .
    container_name: chicken-analysis
    restart: unless-stopped

    # ── Environment variables ────────────────────────────────────────────────
    env_file:
      - .env

    # Healthcheck: Ensures supercronic is running
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep [s]upercronic || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
